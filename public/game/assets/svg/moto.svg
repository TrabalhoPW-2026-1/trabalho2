<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 90" width="60" height="90">
  <!-- Rear tire -->
  <ellipse cx="30" cy="81" rx="13" ry="7" fill="#111"/>
  <ellipse cx="30" cy="81" rx="9" ry="5" fill="#2a2a2a"/>
  <!-- Front tire -->
  <ellipse cx="30" cy="10" rx="13" ry="7" fill="#111"/>
  <ellipse cx="30" cy="10" rx="9" ry="5" fill="#2a2a2a"/>
  <!-- Main frame body -->
  <rect x="22" y="10" width="16" height="71" rx="6" fill="#cc4400"/>
  <!-- Gas tank -->
  <rect x="21" y="26" width="18" height="20" rx="5" fill="#ff5500"/>
  <!-- Seat -->
  <rect x="22" y="48" width="16" height="26" rx="4" fill="#771100"/>
  <!-- Handlebars -->
  <rect x="6" y="13" width="48" height="7" rx="3.5" fill="#666"/>
  <!-- Handlebar grips -->
  <rect x="5" y="12" width="11" height="9" rx="4" fill="#222"/>
  <rect x="44" y="12" width="11" height="9" rx="4" fill="#222"/>
  <!-- Rider arms -->
  <rect x="12" y="26" width="12" height="7" rx="3" fill="#1133aa"/>
  <rect x="36" y="26" width="12" height="7" rx="3" fill="#1133aa"/>
  <!-- Rider torso -->
  <rect x="23" y="28" width="14" height="28" rx="4" fill="#1133aa"/>
  <!-- Helmet -->
  <ellipse cx="30" cy="23" rx="11" ry="10" fill="#cc2200"/>
  <!-- Visor -->
  <rect x="22" y="20" width="16" height="7" rx="3" fill="#99ddff" opacity="0.88"/>
  <!-- Visor glare -->
  <rect x="24" y="21" width="6" height="3" rx="1.5" fill="white" opacity="0.5"/>
  <!-- Headlight -->
  <ellipse cx="30" cy="6" rx="6" ry="3" fill="#ffffaa"/>
</svg>
